name: Formal Verification Specs

# Issue #384 – Formal verification CI gate for critical contract invariants.
#
# Invariants verified:
#   INV-1: total deposits = total debt + reserves
#   INV-2: health factor consistency during operations
#   INV-3: interest accrual monotonicity
#
# This workflow is a required CI gate: PRs touching contract code cannot
# merge if any spec lemma fails.

on:
  push:
    branches: ["main", "dev", "feat/**"]
    paths:
      - "contract/src/**/*.rs"
      - "contract/lending/src/spec/**"
      - "contract/Cargo.toml"
      - "contract/Cargo.lock"
      - ".github/workflows/formal-verification.yml"
  pull_request:
    branches: ["main", "dev"]
    paths:
      - "contract/src/**/*.rs"
      - "contract/lending/src/spec/**"
      - "contract/Cargo.toml"
      - "contract/Cargo.lock"
      - ".github/workflows/formal-verification.yml"
  # Allow manual dispatch to run the full suite (including slow Kani checks)
  workflow_dispatch:
    inputs:
      run_kani:
        description: "Run Kani bounded model-checking harnesses (slow, ~20 min)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: cargo check – fast sanity gate on every push
  # ─────────────────────────────────────────────────────────────────────────────
  cargo-check:
    name: Cargo Check (contract)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contract/target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('contract/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-check-

      - name: cargo check
        working-directory: contract
        run: cargo check --all-targets

      - name: cargo clippy
        working-directory: contract
        run: cargo clippy --all-targets -- -D warnings

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Spec lemma tests – required CI gate (Issue #384)
  #
  # Verifies the following invariants via property-based lemma tests:
  #   INV-1  total deposits = total debt + reserves
  #   INV-2  health factor consistency during operations
  #   INV-3  interest accrual monotonicity
  # ─────────────────────────────────────────────────────────────────────────────
  spec-lemmas:
    name: Spec Lemmas – ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: cargo-check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contract/target
          key: ${{ runner.os }}-cargo-spec-${{ hashFiles('contract/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-spec-

      - name: Run spec lemma tests
        working-directory: contract
        run: |
          cargo test --features spec -- spec:: --test-threads=4 2>&1 | tee spec-results.txt
          # Fail explicitly if any test failed (belt-and-suspenders)
          grep -q "FAILED" spec-results.txt && exit 1 || true

      - name: Run spec tests (release profile)
        working-directory: contract
        run: |
          cargo test --features spec --release -- spec:: --test-threads=4

      - name: Upload spec results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spec-results-${{ matrix.os }}-${{ github.sha }}
          path: contract/spec-results.txt
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Verify spec symbols do NOT leak into production WASM
  # ─────────────────────────────────────────────────────────────────────────────
  spec-isolation:
    name: Spec Isolation (no leakage into WASM)
    runs-on: ubuntu-latest
    needs: cargo-check

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contract/target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('contract/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-

      - name: Build production WASM
        working-directory: contract
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Assert spec symbols absent from WASM
        working-directory: contract
        run: |
          WASM_FILE=$(find target/wasm32-unknown-unknown/release -name "*.wasm" | head -1)
          if [ -z "$WASM_FILE" ]; then
            echo "No WASM binary found – skipping isolation check"
            exit 0
          fi
          echo "Checking WASM binary: $WASM_FILE"
          if strings "$WASM_FILE" | grep -q "lemma_"; then
            echo "::error::Spec symbols found in production WASM binary!"
            exit 1
          fi
          echo "OK: No spec symbols in production WASM."

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Clippy lint of spec modules
  # ─────────────────────────────────────────────────────────────────────────────
  spec-lint:
    name: Clippy Lint (spec modules)
    runs-on: ubuntu-latest
    needs: cargo-check

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contract/target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('contract/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-lint-

      - name: Clippy on spec modules
        working-directory: contract
        run: |
          cargo clippy --features spec -- \
            -D warnings \
            -A clippy::module_name_repetitions

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 5: Kani bounded model-checking (manual dispatch only; slow)
  #
  # Provides exhaustive bounded verification of:
  #   - Absence of overflow/underflow in arithmetic paths
  #   - Accounting invariants (INV-1)
  #   - Health factor monotonicity (INV-2)
  #   - Interest accrual monotonicity (INV-3)
  # ─────────────────────────────────────────────────────────────────────────────
  kani-harnesses:
    name: Kani Model Checking
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_kani == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Install Kani
        run: |
          cargo install --locked kani-verifier
          cargo kani setup

      - name: Run Kani harnesses
        working-directory: contract
        run: |
          cargo kani \
            --features spec \
            --harness spec::interest::kani_interest_properties \
            --harness spec::collateral::kani_collateral_ratio_properties \
            --harness spec::accounting::kani_accounting_invariants \
            --harness spec::health_factor::kani_health_factor_properties \
            --unwind 8 \
            2>&1 | tee kani-report.txt
          grep -q "VERIFICATION FAILED" kani-report.txt && exit 1 || true

      - name: Upload Kani report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kani-verification-report-${{ github.sha }}
          path: contract/kani-report.txt
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # CI Gate – all required jobs must pass (Issue #384 acceptance criterion)
  # ─────────────────────────────────────────────────────────────────────────────
  formal-verification-gate:
    name: Formal Verification Gate
    runs-on: ubuntu-latest
    needs: [spec-lemmas, spec-isolation, spec-lint]
    if: always()
    steps:
      - name: Evaluate gate
        run: |
          echo "spec-lemmas:    ${{ needs.spec-lemmas.result }}"
          echo "spec-isolation: ${{ needs.spec-isolation.result }}"
          echo "spec-lint:      ${{ needs.spec-lint.result }}"

          if [[ "${{ needs.spec-lemmas.result }}"    != "success" ]] || \
             [[ "${{ needs.spec-isolation.result }}" != "success" ]] || \
             [[ "${{ needs.spec-lint.result }}"      != "success" ]]; then
            echo "::error::Formal verification gate FAILED. PR cannot be merged."
            exit 1
          fi

          echo "Formal verification gate PASSED."
